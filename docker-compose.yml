services:
  astroweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astroweb-app
    ports:
      - "80:80"
    environment:
      NGINX_HOST: localhost
      NGINX_PORT: 80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
